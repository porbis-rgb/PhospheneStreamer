<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Phosphene Vision Simulator</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="layout">
    <header>
      <h1>Phosphene Vision Simulator</h1>
      <p class="subtitle">Bionic vision — real-time simulation</p>
    </header>

    <div class="main">
      <div class="viewport">
        <canvas id="display" width="512" height="512"></canvas>
        <div id="overlay" class="overlay">
          <span id="status-text">Connecting…</span>
        </div>
      </div>

      <aside class="panel">
        <div class="panel-header">Controls</div>

        <div class="control-group">
          <label for="size-slider">
            <span>Phosphene Size</span>
            <span id="size-val" class="val">1.0×</span>
          </label>
          <input type="range" id="size-slider" min="0.2" max="4" step="0.1" value="1.0" />
        </div>

        <div class="control-group">
          <label for="dropout-slider">
            <span>Dropout</span>
            <span id="dropout-val" class="val">10%</span>
          </label>
          <input type="range" id="dropout-slider" min="0" max="90" step="1" value="10" />
        </div>

        <div class="control-group">
          <label for="jitter-slider">
            <span>Jitter</span>
            <span id="jitter-val" class="val">2 px</span>
          </label>
          <input type="range" id="jitter-slider" min="0" max="10" step="0.5" value="2" />
        </div>

        <div class="control-group">
          <label for="decay-slider">
            <span>Persistence</span>
            <span id="decay-val" class="val">0.85</span>
          </label>
          <input type="range" id="decay-slider" min="0" max="0.98" step="0.01" value="0.85" />
        </div>

        <div class="control-group">
          <label for="color-select">
            <span>Phosphene Color</span>
          </label>
          <select id="color-select">
            <option value="cyan">Cyan</option>
            <option value="amber">Amber</option>
            <option value="white">White</option>
            <option value="green">Green</option>
            <option value="magenta">Magenta</option>
          </select>
        </div>

        <div class="divider"></div>

        <div class="stats">
          <div class="stat"><span class="stat-label">FPS</span><span id="fps-counter">—</span></div>
          <div class="stat"><span class="stat-label">Frames</span><span id="frame-counter">0</span></div>
          <div class="stat"><span class="stat-label">Source</span><span id="source-label">—</span></div>
        </div>

        <div class="divider"></div>

        <button id="toggle-btn">Pause</button>
      </aside>
    </div>
  </div>

  <script src="/static/script.js"></script>
</body>
</html>
